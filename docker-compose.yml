# ──────────────────────────────────────────────────────────
# Data Extraction Pipeline — Database Services
# ──────────────────────────────────────────────────────────
# Data is stored on your LOCAL filesystem, not inside containers.
#
# Usage:
#   docker compose up -d          # Start databases
#   docker compose down           # Stop (data is preserved locally)
#   docker compose down -v        # Stop and remove named volumes
# ──────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    container_name: de_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: data_extraction
    volumes:
      # ★ Data stored locally at ./local_data/postgres
      - ./local_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    container_name: de_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      # ★ Data stored locally at ./local_data/mongo
      - ./local_data/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5
